name: Build and Publish Docker Image for Production

# Triggers:
# - release (published): GitHub "Releases" UI / API when the release is public.
# - push tags v*: Pushing a tag like v1.2.3 (no Release object required). Useful if
#   releases are created via automation that skips the Releases UI.
# - workflow_dispatch: Manual run (Actions tab → this workflow → Run workflow).
#
# Important: Workflows initiated with the default GITHUB_TOKEN that *create* a release
# do NOT trigger downstream workflows from that release (same repo). Those automations
# must use a PAT, or rely on push.tags / workflow_dispatch here instead.
# See: https://docs.github.com/en/actions/security-for-github-automatic-actions/security-hardening-for-github-actions

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version label for the Docker tag (e.g. 2.5.1 or v2.5.1)"
        required: true
        type: string

jobs:
  build:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image version tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          MANUAL_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            release)
              RAW="$RELEASE_TAG"
              ;;
            push)
              RAW="$REF_NAME"
              ;;
            workflow_dispatch)
              RAW="$MANUAL_TAG"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac
          if [ -z "$RAW" ]; then
            echo "Empty version/tag from event $EVENT_NAME"
            exit 1
          fi
          VERSION="$(echo "$RAW" | sed 's/^v//')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Will push luftdaten/datahub:$VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: luftdaten/datahub:${{ env.VERSION }}
